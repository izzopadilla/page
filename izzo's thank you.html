<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Name Redirect</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        color: white;
        overflow: hidden;
    }

    /* Floating Glowing Papyrus Title */
    h1 {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-family: Papyrus, fantasy;
        font-size: 36px;
        color: #00aaff;

        text-shadow:
            0 0 5px #00aaff,
            0 0 10px #00aaff,
            0 0 20px #00aaff,
            0 0 40px #00aaff;

        animation: floatText 3s ease-in-out infinite;
    }

    @keyframes floatText {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(10px); }
        100% { transform: translateY(0px); }
    }

    input {
        padding: 15px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
        outline: none;
        width: 250px;
        text-align: center;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background-color: #00aaff;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #0088cc;
    }
</style>
</head>

<body>

<h1>whats yer name</h1>

<input type="text" id="nameInput" placeholder="yer name?">
<button onclick="redirectUser()">yes</button>

<script>
function redirectUser() {
    const name = document.getElementById("nameInput").value.toLowerCase();

    if (name === "sophie") {
        window.location.href = "sophie.html";
    } else if (name === "janna") {
        window.location.href = "janna.html";
    } else if (name === "jake") {
        window.location.href = "https://example.com/jake";
    } else if (name === "matthias") {
        window.location.href = "https://example.com/matthias";
    } else if (name === "yvia") {
        window.location.href = "https://example.com/yvia";
    } else if (name === "cai") {
        window.location.href = "https://example.com/cai";
    } else if (name === "leanne") {
        window.location.href = "https://example.com/leanne";
    } else if (name === "luke") {
        window.location.href = "https://example.com/luke";
    } else {
        alert("you are not real");
    }
}
</script>

</body>
</html>
